<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main id="app" class="grid">

        <section class="box nps grid">
            <div class="top">NPS GERAL</div>
            <div class="middle grid">
                <img src="./assets/smile.svg" alt="Emoji Verde Sorrindo">
                Excelente!
            </div>
            <div class="bottom">
                <span>NPS Score:</span>
                <span>75</span>
            </div>
        </section>

        <section 
        class="box sell grid"
        >
            <div class="top">
                Vendas Fechadas
            </div>
            <div class="middle middle-flex">
                <svg 
                viewBox="0 0 232 232"
                style="--percentage: 70;"
                >

                    <circle 
                    cx="50%" 
                    cy="50%" 
                    r="98.5" 
                    opacity="0.1" 
                    stroke="#d9d9d9"
                    />

                    <circle 
                    cx="50%" 
                    cy="50%" 
                    r="98.5" 
                    stroke=url(#paint0_linear_201_85)
                    />

                    <defs>
                        <linearGradient id="paint0_linear_201_85" x1="-9" y1="82" x2="145" y2="178"
                            gradientUnits="userSpaceOnUse">
                            <stop stop-color="#CE9FFC" />
                            <stop offset="1" stop-color="#7367F0" />
                        </linearGradient>
                    </defs>


                </svg>

                <div class="content">
                    <h3>70%</h3>
                    <p>alcançada</p>
                </div>

            </div>
            <div class="bottom">
                <div class="item">
                    <span>Esperado</span>
                    <span>100</span>
                </div>
                <div class="item">
                    <span
                        style="--bg-color: linear-gradient(121.48deg, #ce9ffc 15.98%, #7267f0 82.85%)">Alcançado</span>
                    <span>70</span>
                </div>
            </div>

        </section>

        <section class="box target grid">
            <div class="top">
                Meta Mensal
            </div>
            <div class="middle middle-flex">
                <svg 
                viewBox="0 0 232 232"
                style="--percentage: 90;"
                >

                    <circle 
                    cx="50%" 
                    cy="50%" 
                    r="98.5" 
                    opacity="0.1" 
                    stroke="#d9d9d9"
                    />

                    <circle 
                    cx="50%" 
                    cy="50%" 
                    r="98.5" 
                    stroke=url(#paint0_linear_201_104)
                    />

                    <defs>
                        <linearGradient id="paint0_linear_201_104" x1="1.97421e-07" y1="82" x2="154" y2="178" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#DF9780"/>
                            <stop offset="1" stop-color="#A66DE9"/>
                            </linearGradient>
                        </defs>


                </svg>

                <div class="content">
                    <h3>90%</h3>
                    <p>alcançada</p>
                </div>


            </div>
            <div class="bottom">
                <div class="item">
                    <span>Esperado</span>
                    <span>R$ 70K</span>
                </div>
                <div class="item">
                    <span
                        style="--bg-color: linear-gradient(121.94deg, #df9780 15.98%, #a66de9 82.85%)">Alcançado</span>
                    <span>R$63k</span>
                </div>
            </div>
        </section>

        <section class="box"></section>
    </main>
</body>

</html>
