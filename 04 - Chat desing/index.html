<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 04 - Tipos de botões</title>

    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <div class="contato">
        <img src="./assets/image/Foto.jpg" alt="Foto de Contato" class="contact-image">
        <div class="user">
            <h1>Cecilia Sassaki</h1>
            <span class="status"><img src="./assets/image/online.svg" alt="Online">Online</span>
        </div>
    </div>

        <div class="chat">
            <div class="mensage to">
                <h2>Cecilia - 11:30</h2>
                <p>Tive uma ideia incrível para um projeto! 😍</p>
            </div>
            <div class="mensage me">
                <h2>Você - 11:32</h2>
                <p>Sério? Me conta mais.</p>
            </div>
            <div class="mensage to">
                <h2>Cecilia - 11:34</h2>
                <p>E se a gente fizesse um chat moderno e responsivo em apenas uma semana?</p>
            </div>
            <div class="mensage me">
                <h2>Você - 11:36</h2>
                <p>#boraCodar! 🚀</p>
            </div>
        </div>


        <div class="sendMensage">
            <input type="text" name="" id="mensage" placeholder="Digite Sua Mensage">
            <button type="submit"><img src="./assets/image/send.svg" alt="Mandar Sua Mensagem"></button>
        </div>
</body>
</html>
